[build]
target = "xtensa-esp32s3-none-elf"
rustflags = ["-C", "link-arg=-nostartfiles"]

[target.xtensa-esp32s3-none-elf]
runner = "probe-rs run --chip=esp32s3 --preverify --always-print-stacktrace --no-location --connect-under-reset"

[env]
DEFMT_LOG = "info"


[unstable]
build-std = ["alloc", "core"]
